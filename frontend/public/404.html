<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>StatViz</title>
  <script>
    // SPA redirect for GitHub Pages
    // Encodes the full path into a query string and sends the browser to index.html
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
</html>
